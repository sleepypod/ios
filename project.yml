name: Sleepypod
options:
  bundleIdPrefix: com.sleepypod
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_CFBundleDisplayName: Sleepypod
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Sleepypod:
    type: application
    platform: iOS
    sources:
      - path: Sleepypod
    entitlements:
      path: Sleepypod/Sleepypod.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleepypod.ios
        INFOPLIST_FILE: Sleepypod/Info.plist
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Sleepypod uses your sleep schedule to automatically set bedtime and wake temperatures"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Sleepypod needs local network access to communicate with your pod"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ZUR2343J7S
        PRODUCT_NAME: Sleepypod

  SleepypodTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SleepypodTests
    dependencies:
      - target: Sleepypod
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleepypod.ios.tests
